config firewall policy
    edit 1
        set name "allow-out"
        set srcintf "port1"
        set dstintf "wan1"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTPS" "HTTP"
        set logtraffic all
    next
    edit 2
        set name "block-guest"
        set srcintf "guest"
        set dstintf "wan1"
        set srcaddr "guest_net"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
    next
end
