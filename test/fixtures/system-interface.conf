config system interface
    edit "port1"
        set vdom "root"
        set ip 192.168.1.99 255.255.255.0
        set allowaccess ping https ssh http
        set type physical
        set alias "lan"
        set snmp-index 1
    next
    edit "wan1"
        set vdom "root"
        set mode dhcp
        set allowaccess ping https
        set type physical
        set description "uplink with spaces and \"quotes\""
        set snmp-index 2
    next
end
